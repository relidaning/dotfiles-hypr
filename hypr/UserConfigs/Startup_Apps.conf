# Commands and Apps to be executed at launch

# Bridge X11 clipboard (XWayland apps like WeChat) → Wayland so cliphist captures images
exec-once = $HOME/.config/hypr/UserScripts/X11ClipboardBridge.sh

# Delayed start so Waybar's StatusNotifierWatcher is ready before these apps try to register their tray icons
exec-once = bash -c "sleep 3 && v2rayn > /tmp/v2rayn.log 2>&1"
exec-once = bash -c "sleep 3 && /opt/Nextcloud/Nextcloud-33.0.2-x86_64.AppImage > /tmp/nextcloud.log 2>&1"

