# FLOAT
windowrulev2 = float, tag:^(KooL_Cheat)$
windowrulev2 = float, tag:^(wallpaper)$
windowrulev2 = center, tag:^(wallpaper)$
windowrulev2 = float, tag:^(settings)$
windowrulev2 = center, tag:^(settings)$
windowrulev2 = float, tag:^(viewer)$
windowrulev2 = center, tag:^(viewer)$
windowrulev2 = float, tag:^(KooL-Settings)$
windowrulev2 = center, tag:^(KooL-Settings)$
windowrulev2 = float, class:^(Zoom|onedriver|onedriver-launcher)$
windowrulev2 = float, class:^(org.gnome.Calculator|qalculate-gtk)$
windowrulev2 = float, class:^(mpv|com.github.rafostar.Clapper)$
windowrulev2 = float, class:^([Qq]alculate-gtk)$
windowrulev2 = float, class:^([Ff]erdium)$

# popups and dialogue 
windowrulev2 = float, title:^(Authentication Required)$
windowrulev2 = center, title:^(Authentication Required)$
windowrulev2 = float, class:^(codium|codium-url-handler|VSCodium)$, title:!(.*codium.*|.*VSCodium.*)
windowrulev2 = float, class:^(com.heroicgameslauncher.hgl)$, title:!(Heroic Games Launcher)
windowrulev2 = float, class:^([Ss]team)$, title:!^([Ss]team)$
windowrulev2 = float, title:^(Add Folder to Workspace)$
windowrulev2 = size 70% 60%, title:^(Add Folder to Workspace)$
windowrulev2 = center, title:^(Add Folder to Workspace)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = size 70% 60%, title:^(Save As)$
windowrulev2 = center, title:^(Save As)$
windowrulev2 = float, initialtitle:^(Open Files)$
windowrulev2 = size 70% 60%, initialtitle:^(Open Files)$
windowrulev2 = float, title:^(SDDM Background)$
windowrulev2 = center, title:^(SDDM Background)$
windowrulev2 = size 16% 12%, title:^(SDDM Background)$
windowrulev2 = float, class:^(yad)$
windowrulev2 = center, class:^(yad)$
windowrulev2 = size 20% 20%, class:^(yad)$
windowrulev2 = float, class:^(hyprland-donate-screen)$
windowrulev2 = center, class:^(hyprland-donate-screen)$

# OPACITY
windowrulev2 = opacity 0.99 0.8, tag:^(browser)$
windowrulev2 = opacity 0.9 0.8, tag:^(projects)$
windowrulev2 = opacity 0.94 0.86, tag:^(im)$
windowrulev2 = opacity 0.94 0.86, tag:^(multimedia)$
windowrulev2 = opacity 0.3 0.3, tag:^(file-manager)$
windowrulev2 = opacity 0.9 0.7, tag:^(terminal)$
windowrulev2 = opacity 0.8 0.7, tag:^(settings)$
windowrulev2 = opacity 0.82 0.75, tag:^(viewer)$
windowrulev2 = opacity 0.9 0.7, tag:^(wallpaper)$
windowrulev2 = opacity 0.8 0.7, class:^(gedit|org.gnome.TextEditor|mousepad)$
windowrulev2 = opacity 0.9 0.8, class:^(deluge)$
windowrulev2 = opacity 0.9 0.8, class:^(seahorse)$
windowrulev2 = opacity 0.95 0.75, title:^(Picture-in-Picture)$

# SIZE
windowrulev2 = size 65% 90%, tag:^(KooL_Cheat)$
windowrulev2 = size 70% 70%, tag:^(wallpaper)$
windowrulev2 = size 70% 70%, tag:^(settings)$
windowrulev2 = size 60% 70%, class:^([Ff]erdium)$

# # BLUR & FULLSCREEN (games)
# windowrulev2 = noblur, tag:^(games)$
# windowrulev2 = fullscreen 0, tag:^(games)$
#
# # JetBrains popups should not grab focus
# windowrulev2 = noinitialfocus, class:^(jetbrains-.*)$
# windowrulev2 = noinitialfocus, title:^(wind.*)$

# LAYER RULES
layerrule = blur, namespace:^(rofi)$
layerrule = blur, namespace:^(notifications)$
layerrule = blur, namespace:^(quickshell:overview)$
layerrule = ignorealpha 0.5, namespace:^(quickshell:overview)$
