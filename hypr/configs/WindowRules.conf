# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Vendor defaults for window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# NOTES: This is only for Hyprland >= 0.53

#  Some samples on hwo to start apps on specific workspaces 
# windowrule = match:tag email*, workspace 1
# windowrule = match:tag browser*, workspace 2
# windowrule = match:tag projects*, workspace 3
# windowrule = match:tag screenshare*, workspace 4 silent
# windowrule = match:tag gamestore*, workspace 5
# windowrule = match:class ^(virt-manager)$, workspace 6 silent
# windowrule = match:class ^(.virt-manager-wrapped)$, workspace 6 silent
# windowrule = match:tag im*, workspace 7
# windowrule = match:class obsidian, workspace 8
# windowrule = match:tag games*, workspace 8
# windowrule = match:tag multimedia*, workspace 9 silent



# TAGS - add apps under appropriate tag to use the same settings
# browser tags
windowrulev2 = tag +browser, class:^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$
windowrulev2 = tag +browser, class:^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrulev2 = tag +browser, class:^(chrome-.+-Default)$
windowrulev2 = tag +browser, class:^([Cc]hromium)$

# notif tags
windowrulev2 = tag +notif class:^(swaync-control-center|swaync-notification-window|swaync-client|class)$

# KooL settings tag
windowrulev2 = tag +KooL_Cheat, title:^(KooL Quick Cheat Sheet)$
windowrulev2 = tag +KooL_Settings, title:^(KooL Hyprland Settings)$
windowrulev2 = tag +KooL-Settings, class:^(nwg-displays|nwg-look)$

# terminal tags
windowrulev2 = tag +terminal, class:^(Alacritty|kitty|kitty-dropterm)$

# email tags
windowrulev2 = tag +email, class:^([Tt]hunderbird|org.mozilla.Thunderbird)$
windowrulev2 = tag +email, class:^(eu.betterbird.Betterbird)$
windowrulev2 = tag +email, class:^(org.gnome.Evolution)$

# project tags
windowrulev2 = tag +projects, class:^(codium|codium-url-handler|VSCodium)$
windowrulev2 = tag +projects, class:^(VSCode|code|code-url-handler)$
windowrulev2 = tag +projects, class:^(jetbrains-.+)$
windowrulev2 = tag +projects, class:^(dev.zed.Zed|antigravity)$

# screenshare tags
windowrulev2 = tag +screenshare, class:^(com.obsproject.Studio)$

# IM tags
windowrulev2 = tag +im, class:^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$
windowrulev2 = tag +im, class:^([Ff]erdium)$
windowrulev2 = tag +im, class:^([Ww]hatsapp-for-linux)$
windowrulev2 = tag +im, class:^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$
windowrulev2 = tag +im, class:^(teams-for-linux)$
windowrulev2 = tag +im, class:^(im.riot.Riot|Element)$
windowrulev2 = tag +im, class:^(wechat)$

# game tags
windowrulev2 = tag +games, class:^(gamescope)$
windowrulev2 = tag +games, class:^(steam_app_\\d+)$

# gamestore tags
windowrulev2 = tag +gamestore, class:^([Ss]team)$
windowrulev2 = tag +gamestore, title:^([Ll]utris)$
windowrulev2 = tag +gamestore, class:^(com.heroicgameslauncher.hgl)$

# file-manager tags
windowrulev2 = tag +file-manager, class:^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$
windowrulev2 = tag +file-manager, class:^(app.drey.Warp)$

# wallpaper tags
windowrulev2 = tag +wallpaper, class:^([Ww]aytrogen)$

# multimedia tags
windowrulev2 = tag +multimedia, class:^([Aa]udacious)$

# multimedia-video tags
windowrulev2 = tag +multimedia_video, class:^([Mm]pv|vlc)$

# settings tags
windowrulev2 = tag +settings, title:^(ROG Control)$
windowrulev2 = tag +settings, class:^(wihotspot(-gui)?)$
windowrulev2 = tag +settings, class:^([Bb]aobab|org.gnome.[Bb]aobab)$
windowrulev2 = tag +settings, class:^(gnome-disks|wihotspot(-gui)?)$
windowrulev2 = tag +settings, title:(Kvantum Manager), tag +settings
windowrulev2 = tag +settings, class:^(file-roller|org.gnome.FileRoller)$
windowrulev2 = tag +settings, class:^(nm-applet|nm-connection-editor|blueman-manager)$
windowrulev2 = tag +settings, class:^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrulev2 = tag +settings, class:^(qt5ct|qt6ct)$
windowrulev2 = tag +settings, class:(xdg-desktop-portal-gtk), tag +settings
windowrulev2 = tag +settings, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = tag +settings, class:^([Rr]ofi)$
windowrulev2 = tag +settings, class:^(btrfs-assistant)$
windowrulev2 = tag +settings, class:^(timeshift-gtk)$

# viewer tags
windowrulev2 = tag +viewer, class:^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$
windowrulev2 = tag +viewer, class:^(evince)$
windowrulev2 = tag +viewer, class:^(eog|org.gnome.Loupe)$

